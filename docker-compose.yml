# 多模态重排服务 Docker Compose 配置
version: '3.8'

services:
  reranker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reranker
    restart: unless-stopped
    ports:
      - "${PORT:-6006}:6006"
    environment:
      # 服务器配置
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-6006}
      - WORKERS=1
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-100}
      - TIMEOUT=${TIMEOUT:-300}
      - KEEP_ALIVE=${KEEP_ALIVE:-5}
      - ACCESS_TOKEN=${ACCESS_TOKEN:-}
      
      # 模型配置 - 多模态模型
      - MODEL_NAME_OR_PATH=${MODEL_NAME_OR_PATH:-/app/models/Qwen3-VL-Reranker-2B}
      - MODEL_TYPE=${MODEL_TYPE:-multimodal}
      - MODEL_DEVICE=${MODEL_DEVICE:-cuda}
      - MODEL_PRECISION=${MODEL_PRECISION:-bf16}
      
      # 性能配置
      - CUDA_VISIBLE_DEVICES=0
      - CUDA_HOME=/usr/local/cuda-12.1
      - LD_LIBRARY_PATH=/usr/local/cuda-12.1/lib64:/usr/local/cuda-12.1/extras/CUPTI/lib64:$LD_LIBRARY_PATH
      - MAX_SEQ_LENGTH=${MAX_SEQ_LENGTH:-512}
      - BATCH_SIZE=${BATCH_SIZE:-4}
      - MAX_MEMORY_PERCENTAGE=${MAX_MEMORY_PERCENTAGE:-80}
      
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-'%(asctime)s - %(name)s - %(levelname)s - %(message)s'}
      
      # 离线模式
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - LOCAL_FILES_ONLY=1
      
      # CUDA内存优化
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128
      - TOKENIZERS_PARALLELISM=false
      - TORCH_CUDA_ARCH_LIST="8.0;8.6"
      
      # 禁用不必要的服务
      - GRADIO_SERVER_PORT=0
      - DISABLE_TELEMETRY=1
      - HF_DATASETS_OFFLINE=1
      - HF_EVALUATE_OFFLINE=1
      - HF_TOKENIZERS_IS_IN_TESTS=1
      - OMP_NUM_THREADS=1
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    shm_size: '2gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: 
                - gpu
                - compute
                - utility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: reranker-network
    driver: bridge
